{
  "$schema": "https://json.schemastore.org/pyproject",
  "name": "cpp-ai-assistant",
  "version": "1.0.0",
  "description": "C++ Code Refactoring and Programming AI Assistant with Qwen Integration",
  "author": "Matrix Agent",
  "license": "MIT",
  "readme": "README.md",
  "requires-python": "==3.11.9",
  "dependencies": [
    "fastapi>=0.128.2",
    "uvicorn>=0.40.0",
    "starlette>=0.50.0",
    "python-multipart>=0.0.22",
    "pydantic>=2.12.5",
    "httpx>=0.28.1",
    "httpcore>=1.0.9",
    "torch>=2.10.0",
    "transformers>=5.1.0",
    "sentence-transformers>=5.2.2",
    "numpy>=2.4.2",
    "scipy>=1.17.0",
    "scikit-learn>=1.8.0",
    "pandas>=3.0.0",
    "tree-sitter>=0.21.0",
    "tree-sitter-languages>=1.10.0",
    "pyyaml>=6.0.3",
    "tenacity>=9.1.3",
    "python-dotenv>=1.2.1",
    "jinja2>=3.1.6",
    "rich>=14.3.2",
    "tqdm>=4.67.3",
    "apscheduler>=3.11.2",
    "aiofiles>=25.1.0",
    "chromadb>=1.5.4",
    "chroma-hnswlib>=0.7.5"
  ],
  "optional-dependencies": {
    "dev": [
      "pytest>=7.4.0",
      "pytest-asyncio>=0.23.0",
      "pytest-cov>=4.1.0",
      "black>=23.12.0",
      "ruff>=0.2.0",
      "mypy>=1.8.0"
    ]
  },
  "scripts": {
    "start": "uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload",
    "dev": "uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload",
    "test": "pytest tests/ -v --cov=backend --cov-report=html",
    "test:unit": "pytest tests/unit/ -v",
    "test:integration": "pytest tests/integration/ -v",
    "lint": "ruff check backend/ tests/",
    "format": "black backend/ tests/"
  },
  "tool": {
    "black": {
      "line-length": 100,
      "target-version": ["py311"]
    },
    "ruff": {
      "line-length": 100,
      "target-version": "py311"
    }
  }
}